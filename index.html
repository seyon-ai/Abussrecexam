<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ABUSS Recruitment Exam V2</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg"></div>
<div class="wrap">
<h1>⚡ ABUSS RECRUITMENT EXAM</h1>
<div class="glass">
<input id="name" placeholder="Candidate Name">

<textarea id="q1" placeholder="Q1. Why do you want to join this project?"></textarea>
<textarea id="q2" placeholder="Q2. Would you continue after 3 months of no results?"></textarea>
<textarea id="q3" placeholder="Q3. How would you get the first 100 visitors?"></textarea>
<textarea id="q4" placeholder="Q4. Motivation or Discipline? Why?"></textarea>
<textarea id="q5" placeholder="Q5. Your role after 5 years?"></textarea>
<textarea id="q6" placeholder="Final Question"></textarea>

<button onclick="submitExam()">SUBMIT EXAM</button>
</div>
</div>
<script src="script.js"></script>
</body>
</html>
