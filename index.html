<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>M. XZONA</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --surface2: #1a1a26;
  --border: #2a2a3a;
  --accent: #7c3aed;
  --accent2: #a855f7;
  --accent-glow: rgba(124,58,237,0.3);
  --gold: #f59e0b;
  --green: #10b981;
  --red: #ef4444;
  --text: #f0f0ff;
  --muted: #8888aa;
  --font-display: 'Syne', sans-serif;
  --font-body: 'Space Grotesk', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;overflow-x:hidden;}
#root{min-height:100vh;}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(10,10,15,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 2rem;height:64px;display:flex;align-items:center;justify-content:space-between;}
.nav-logo{font-family:var(--font-display);font-size:1.4rem;font-weight:800;background:linear-gradient(135deg,var(--accent2),#e879f9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;cursor:pointer;letter-spacing:-0.02em;}
.nav-links{display:flex;gap:0.5rem;align-items:center;}
.nav-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:0.4rem 1rem;border-radius:8px;cursor:pointer;font-family:var(--font-body);font-size:0.85rem;transition:all 0.2s;}
.nav-btn:hover,.nav-btn.active{border-color:var(--accent);color:var(--text);background:var(--accent-glow);}
.nav-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.nav-btn.primary:hover{background:var(--accent2);border-color:var(--accent2);}

/* PAGES */
.page{min-height:100vh;padding-top:64px;}
.hidden{display:none!important;}

/* HERO */
.hero{min-height:calc(100vh - 64px);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;position:relative;overflow:hidden;}
.hero-glow{position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(124,58,237,0.15),transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;}
.hero-badge{display:inline-flex;align-items:center;gap:0.5rem;background:var(--surface2);border:1px solid var(--border);border-radius:100px;padding:0.35rem 1rem;font-size:0.75rem;color:var(--muted);margin-bottom:2rem;font-family:var(--font-mono);}
.hero-badge span{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
.hero h1{font-family:var(--font-display);font-size:clamp(2.5rem,7vw,5rem);font-weight:800;line-height:1.05;letter-spacing:-0.03em;margin-bottom:1.5rem;}
.hero h1 .x{background:linear-gradient(135deg,var(--accent),var(--accent2),#e879f9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hero p{color:var(--muted);font-size:1.1rem;max-width:520px;line-height:1.7;margin-bottom:2.5rem;}
.hero-actions{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;}
.btn{padding:0.75rem 1.75rem;border-radius:10px;border:none;cursor:pointer;font-family:var(--font-body);font-weight:600;font-size:0.95rem;transition:all 0.2s;}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 0 30px var(--accent-glow);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 0 50px var(--accent-glow);}
.btn-outline{background:none;border:1px solid var(--border);color:var(--text);}
.btn-outline:hover{border-color:var(--accent);background:var(--accent-glow);}
.btn-sm{padding:0.5rem 1.2rem;font-size:0.85rem;border-radius:8px;}
.btn-danger{background:var(--red);color:#fff;}
.btn-success{background:var(--green);color:#fff;}
.btn-gold{background:var(--gold);color:#000;font-weight:700;}

/* STATS */
.stats-row{display:flex;gap:2rem;justify-content:center;flex-wrap:wrap;margin-top:3rem;}
.stat{text-align:center;}
.stat-num{font-family:var(--font-display);font-size:2rem;font-weight:800;background:linear-gradient(135deg,var(--accent2),#e879f9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.stat-label{font-size:0.75rem;color:var(--muted);margin-top:0.2rem;}

/* CARDS GRID */
.section{padding:4rem 2rem;max-width:1200px;margin:0 auto;}
.section-title{font-family:var(--font-display);font-size:1.8rem;font-weight:700;margin-bottom:0.5rem;}
.section-sub{color:var(--muted);margin-bottom:2rem;font-size:0.95rem;}
.grid-3{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1.5rem;}
.grid-2{display:grid;grid-template-columns:repeat(auto-fill,minmax(400px,1fr));gap:1.5rem;}

/* TEST CARD */
.test-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;transition:all 0.2s;position:relative;}
.test-card:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:0 10px 40px rgba(124,58,237,0.15);}
.test-thumb{width:100%;height:160px;background:linear-gradient(135deg,var(--surface2),var(--border));display:flex;align-items:center;justify-content:center;font-size:3rem;position:relative;overflow:hidden;}
.test-thumb img{width:100%;height:100%;object-fit:cover;}
.test-type-badge{position:absolute;top:0.75rem;right:0.75rem;padding:0.25rem 0.6rem;border-radius:6px;font-size:0.7rem;font-weight:600;font-family:var(--font-mono);}
.badge-free{background:rgba(16,185,129,0.2);color:var(--green);border:1px solid rgba(16,185,129,0.3);}
.badge-paid{background:rgba(245,158,11,0.2);color:var(--gold);border:1px solid rgba(245,158,11,0.3);}
.badge-locked{background:rgba(124,58,237,0.2);color:var(--accent2);border:1px solid rgba(124,58,237,0.3);}
.badge-password{background:rgba(239,68,68,0.2);color:var(--red);border:1px solid rgba(239,68,68,0.3);}
.test-body{padding:1.25rem;}
.test-title{font-weight:600;font-size:1rem;margin-bottom:0.4rem;}
.test-meta{font-size:0.78rem;color:var(--muted);display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:0.75rem;}
.test-footer{display:flex;align-items:center;justify-content:space-between;margin-top:0.5rem;}
.diff-badge{padding:0.2rem 0.6rem;border-radius:5px;font-size:0.7rem;font-weight:600;}
.diff-easy{background:rgba(16,185,129,0.15);color:var(--green);}
.diff-medium{background:rgba(245,158,11,0.15);color:var(--gold);}
.diff-hard{background:rgba(239,68,68,0.15);color:var(--red);}

/* SEARCH BAR */
.search-wrap{display:flex;gap:1rem;margin-bottom:2rem;flex-wrap:wrap;}
.search-input{flex:1;min-width:200px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:0.75rem 1rem;color:var(--text);font-family:var(--font-body);font-size:0.95rem;outline:none;transition:border-color 0.2s;}
.search-input:focus{border-color:var(--accent);}
.search-input::placeholder{color:var(--muted);}
.link-input-wrap{display:flex;gap:0.5rem;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:0.5rem;flex:1;min-width:200px;}
.link-input{background:none;border:none;color:var(--text);font-family:var(--font-mono);font-size:0.85rem;outline:none;flex:1;padding:0.25rem;}
.link-input::placeholder{color:var(--muted);}

/* AUTH */
.auth-wrap{min-height:calc(100vh - 64px);display:flex;align-items:center;justify-content:center;padding:2rem;}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2.5rem;width:100%;max-width:440px;}
.auth-title{font-family:var(--font-display);font-size:1.6rem;font-weight:700;margin-bottom:0.4rem;}
.auth-sub{color:var(--muted);font-size:0.9rem;margin-bottom:2rem;}
.form-group{margin-bottom:1.25rem;}
.form-label{display:block;font-size:0.85rem;color:var(--muted);margin-bottom:0.4rem;font-weight:500;}
.form-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:0.75rem 1rem;color:var(--text);font-family:var(--font-body);font-size:0.95rem;outline:none;transition:border-color 0.2s;}
.form-input:focus{border-color:var(--accent);}
.form-input::placeholder{color:var(--muted);}
.divider{display:flex;align-items:center;gap:1rem;margin:1.5rem 0;color:var(--muted);font-size:0.8rem;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.social-btns{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;}
.social-btn{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:0.65rem;cursor:pointer;font-family:var(--font-body);font-size:0.85rem;color:var(--text);display:flex;align-items:center;justify-content:center;gap:0.5rem;transition:all 0.2s;}
.social-btn:hover{border-color:var(--accent);background:var(--accent-glow);}
.social-btn.full{grid-column:1/-1;}
.error-msg{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:8px;padding:0.75rem 1rem;color:var(--red);font-size:0.85rem;margin-bottom:1rem;}
.success-msg{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);border-radius:8px;padding:0.75rem 1rem;color:var(--green);font-size:0.85rem;margin-bottom:1rem;}

/* DASHBOARD */
.dash-wrap{padding:2rem;max-width:1200px;margin:0 auto;}
.dash-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:1rem;}
.dash-title{font-family:var(--font-display);font-size:1.8rem;font-weight:700;}
.tabs{display:flex;gap:0.25rem;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:0.25rem;}
.tab{padding:0.5rem 1.25rem;border-radius:8px;border:none;background:none;color:var(--muted);cursor:pointer;font-family:var(--font-body);font-size:0.85rem;font-weight:500;transition:all 0.2s;}
.tab.active{background:var(--accent);color:#fff;}

/* TESTER CREATE */
.create-wrap{padding:2rem;max-width:900px;margin:0 auto;}
.create-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2rem;margin-bottom:1.5rem;}
.create-section-title{font-family:var(--font-display);font-weight:700;font-size:1.1rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:0.5rem;}
.create-section-title .icon{width:28px;height:28px;background:var(--accent-glow);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:0.9rem;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.form-select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:0.75rem 1rem;color:var(--text);font-family:var(--font-body);font-size:0.95rem;outline:none;cursor:pointer;}
.form-select:focus{border-color:var(--accent);}
.form-select option{background:var(--surface2);}
.form-textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:0.75rem 1rem;color:var(--text);font-family:var(--font-body);font-size:0.95rem;outline:none;resize:vertical;min-height:80px;}
.form-textarea:focus{border-color:var(--accent);}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:0.75rem 0;border-bottom:1px solid var(--border);}
.toggle-row:last-child{border-bottom:none;}
.toggle-label{font-size:0.9rem;}
.toggle-desc{font-size:0.75rem;color:var(--muted);margin-top:0.15rem;}
.toggle{width:44px;height:24px;background:var(--border);border-radius:100px;border:none;cursor:pointer;position:relative;transition:background 0.2s;}
.toggle.on{background:var(--accent);}
.toggle::after{content:'';width:18px;height:18px;background:#fff;border-radius:50%;position:absolute;top:3px;left:3px;transition:transform 0.2s;}
.toggle.on::after{transform:translateX(20px);}

/* QUESTION BUILDER */
.q-item{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:1rem;position:relative;}
.q-header{display:flex;align-items:center;gap:0.75rem;margin-bottom:1rem;}
.q-num{width:28px;height:28px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;flex-shrink:0;}
.q-type-tag{font-size:0.7rem;font-family:var(--font-mono);padding:0.2rem 0.5rem;background:var(--border);border-radius:5px;color:var(--muted);}
.q-remove{position:absolute;top:1rem;right:1rem;background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.1rem;}
.q-remove:hover{color:var(--red);}
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;margin-top:0.75rem;}
.option-input-wrap{display:flex;align-items:center;gap:0.5rem;}
.option-radio{width:16px;height:16px;accent-color:var(--accent);cursor:pointer;flex-shrink:0;}
.add-option-btn{background:none;border:1px dashed var(--border);border-radius:8px;padding:0.5rem;color:var(--muted);cursor:pointer;font-size:0.8rem;width:100%;margin-top:0.5rem;font-family:var(--font-body);transition:all 0.2s;}
.add-option-btn:hover{border-color:var(--accent);color:var(--accent);}
.ai-flag{display:flex;align-items:center;gap:0.5rem;font-size:0.75rem;color:var(--gold);background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.2);border-radius:7px;padding:0.4rem 0.75rem;margin-top:0.5rem;}

/* EXAM */
.exam-wrap{padding:2rem;max-width:800px;margin:0 auto;}
.exam-header{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;}
.exam-info h2{font-family:var(--font-display);font-size:1.3rem;font-weight:700;}
.exam-meta{font-size:0.8rem;color:var(--muted);margin-top:0.3rem;}
.timer{font-family:var(--font-mono);font-size:1.5rem;font-weight:700;color:var(--accent2);background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:0.5rem 1rem;}
.timer.warning{color:var(--red);}
.progress-bar{width:100%;height:4px;background:var(--border);border-radius:2px;margin-bottom:2rem;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width 0.3s;}
.exam-q{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
.exam-q-num{font-size:0.75rem;color:var(--muted);font-family:var(--font-mono);margin-bottom:0.5rem;}
.exam-q-text{font-size:1rem;font-weight:500;line-height:1.6;margin-bottom:1.25rem;}
.exam-option{display:flex;align-items:center;gap:0.75rem;padding:0.75rem 1rem;background:var(--surface2);border:1px solid var(--border);border-radius:10px;margin-bottom:0.5rem;cursor:pointer;transition:all 0.2s;}
.exam-option:hover{border-color:var(--accent);background:var(--accent-glow);}
.exam-option.selected{border-color:var(--accent);background:var(--accent-glow);}
.exam-option input{accent-color:var(--accent);}
.exam-textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:0.75rem 1rem;color:var(--text);font-family:var(--font-body);font-size:0.9rem;outline:none;resize:vertical;min-height:100px;}
.exam-textarea:focus{border-color:var(--accent);}

/* RESULTS */
.result-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2.5rem;text-align:center;max-width:500px;margin:0 auto;}
.result-score{font-family:var(--font-display);font-size:4rem;font-weight:800;margin:1rem 0;}
.result-score.pass{background:linear-gradient(135deg,var(--green),#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.result-score.fail{background:linear-gradient(135deg,var(--red),#f87171);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.result-verdict{font-size:1.3rem;font-weight:600;margin-bottom:1rem;}
.ai-rec{background:linear-gradient(135deg,rgba(124,58,237,0.1),rgba(168,85,247,0.1));border:1px solid rgba(124,58,237,0.3);border-radius:12px;padding:1rem;margin:1rem 0;text-align:left;}
.ai-rec-title{font-size:0.75rem;font-family:var(--font-mono);color:var(--accent2);margin-bottom:0.4rem;}

/* REVIEW PANEL */
.review-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:1rem;}
.review-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem;}
.review-user{display:flex;align-items:center;gap:0.75rem;}
.avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.85rem;flex-shrink:0;}
.review-score{font-family:var(--font-mono);font-size:1.1rem;font-weight:700;}
.review-actions{display:flex;gap:0.5rem;}
.flag-badge{display:inline-flex;align-items:center;gap:0.3rem;font-size:0.7rem;color:var(--gold);background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.2);border-radius:5px;padding:0.2rem 0.5rem;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(5px);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2rem;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;}
.modal-title{font-family:var(--font-display);font-size:1.3rem;font-weight:700;margin-bottom:1.5rem;}
.modal-footer{display:flex;gap:0.75rem;justify-content:flex-end;margin-top:1.5rem;}

/* LOADING */
.loader{display:flex;align-items:center;justify-content:center;gap:0.5rem;padding:2rem;color:var(--muted);}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* AI XZONA PANEL */
.ai-panel{background:linear-gradient(135deg,var(--surface),rgba(124,58,237,0.05));border:1px solid rgba(124,58,237,0.3);border-radius:16px;padding:1.5rem;position:relative;overflow:hidden;}
.ai-panel::before{content:'';position:absolute;top:-50%;right:-20%;width:300px;height:300px;background:radial-gradient(circle,rgba(124,58,237,0.08),transparent 70%);pointer-events:none;}
.ai-panel-title{font-family:var(--font-display);font-size:1rem;font-weight:700;color:var(--accent2);margin-bottom:1rem;display:flex;align-items:center;gap:0.5rem;}
.ai-thinking{display:flex;gap:0.3rem;align-items:center;}
.ai-dot{width:6px;height:6px;border-radius:50%;background:var(--accent2);animation:bounce 1s infinite;}
.ai-dot:nth-child(2){animation-delay:0.15s;}
.ai-dot:nth-child(3){animation-delay:0.3s;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}

/* CERT */
.cert-card{background:linear-gradient(135deg,#1a1a26,#0a0a1a);border:2px solid var(--gold);border-radius:16px;padding:2rem;text-align:center;position:relative;overflow:hidden;}
.cert-card::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 40px,rgba(245,158,11,0.02) 40px,rgba(245,158,11,0.02) 41px);pointer-events:none;}
.cert-title{font-family:var(--font-display);font-size:0.75rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);margin-bottom:1rem;}
.cert-name{font-family:var(--font-display);font-size:1.8rem;font-weight:800;margin-bottom:0.5rem;}
.cert-body{color:var(--muted);font-size:0.85rem;line-height:1.6;}

/* TOAST */
.toast{position:fixed;bottom:2rem;right:2rem;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:1rem 1.5rem;z-index:300;display:flex;align-items:center;gap:0.75rem;box-shadow:0 10px 40px rgba(0,0,0,0.5);animation:slideIn 0.3s ease;}
@keyframes slideIn{from{transform:translateX(100px);opacity:0;}to{transform:translateX(0);opacity:1;}}
.toast.success{border-color:rgba(16,185,129,0.4);}
.toast.error{border-color:rgba(239,68,68,0.4);}

/* RESPONSIVE */
@media(max-width:600px){
  .form-row{grid-template-columns:1fr;}
  .social-btns{grid-template-columns:1fr;}
  .social-btn.full{grid-column:1;}

// ── GROQ AI ──
async function callGroq(prompt, systemPrompt='You are an AI assistant for M. XZONA exam platform. Be concise and helpful.'){
  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${window.GROQ_KEY||''}`},
      body: JSON.stringify({
        model:'mixtral-8x7b-32768',
        messages:[{role:'system',content:systemPrompt},{role:'user',content:prompt}],
        max_tokens:800,temperature:0.7
      })
    });
    const d = await res.json();
    return d.choices?.[0]?.message?.content || 'AI unavailable';
  } catch(e){ return 'AI unavailable — configure GROQ API key'; }
}

async function detectAiText(text){
  if(!text || text.length < 30) return {flagged:false, score:0};
  const result = await callGroq(
    `Analyze this answer and determine if it was written by AI. Answer ONLY with JSON: {"flagged": true/false, "confidence": 0-100, "reason": "brief reason"}\n\nText: "${text.substring(0,400)}"`,
    'You are an AI detection expert. Return only valid JSON.'
  );
  try { return JSON.parse(result.replace(/```json|```/g,'')); }
  catch(e){ return {flagged:false, confidence:0, reason:'Check failed'}; }
}

async function aiScoreAnswers(questions, answers, requirements){
  const qa = questions.map((q,i)=>({q:q.text,type:q.type,answer:answers[i]||'',marks:q.marks}));
  const result = await callGroq(
    `You are grading an exam. Requirements: ${requirements||'Standard grading'}.\nQuestions and answers: ${JSON.stringify(qa)}\nReturn ONLY JSON: {"totalScore": number, "maxScore": number, "breakdown": [{"qIndex": 0, "awarded": number, "feedback": "brief"}], "recommendation": "pass/fail", "summary": "2 sentence summary"}`,
    'You are a fair and precise exam grader. Return only valid JSON.'
  );
  try { return JSON.parse(result.replace(/```json|```/g,'')); }
  catch(e){ return {totalScore:0,maxScore:100,breakdown:[],recommendation:'review',summary:'AI scoring unavailable'}; }
}

async function generateQuestions(topic, type, count, difficulty){
  const result = await callGroq(
    `Generate ${count} ${type} exam questions about "${topic}" at ${difficulty} difficulty.\nReturn ONLY JSON array: [{"text":"question","type":"${type}","marks":${type==='MCQ'?1:5},"options":${type==='MCQ'?'["A","B","C","D"]':'null'},"correctAnswer":"answer or null"}]`,
    'You are an expert exam question generator. Return only valid JSON array.'
  );
  try { return JSON.parse(result.replace(/```json|```/g,'')); }
  catch(e){ return []; }
}

    ` : `
      <textarea class="exam-textarea" placeholder="Write your answer here…" onchange="window.setAnswer(${i},this.value)" oninput="window.setAnswer(${i},this.value)">${examAnswers[i]||''}</textarea>
    `}
  </div>`;
}

window.setAnswer = (i, val) => {
  examAnswers[i] = val;
  const prog = document.getElementById('exam-progress');
  if(prog){
    const answered = Object.keys(examAnswers).length;
    const total = currentTest?.questions?.length || 1;
    prog.style.width = `${Math.round(answered/total*100)}%`;
  }
};

function debounce(fn, ms){ let t; return (...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms);} }

// ── AUTH HANDLERS ──
async function handleSignIn(){
  const e=document.getElementById('auth-email')?.value;
  const p=document.getElementById('auth-password')?.value;
  clearAuthMessages();
  try{
    const c = await signInWithEmailAndPassword(auth,e,p);
    if(!c.user.emailVerified){ showAuthError('Please verify your email first. Check your inbox.'); return; }
    showToast('Signed in!');
    navigate('home');
  } catch(err){ showAuthError(friendlyError(err.code)); }
}

async function handleSignUp(){
  const e=document.getElementById('auth-email')?.value;
  const p=document.getElementById('auth-password')?.value;
  clearAuthMessages();
  if(!e||!p){ showAuthError('Email and password are required.'); return; }
  if(p.length<6){ showAuthError('Password must be at least 6 characters.'); return; }
  try{
    const c = await createUserWithEmailAndPassword(auth,e,p);
    await sendEmailVerification(c.user);
    await setDoc(doc(db,'users',c.user.uid),{email:e,role:'user',createdAt:serverTimestamp()});
    showAuthSuccess('Account created! Check your email to verify your account.');
  } catch(err){ showAuthError(friendlyError(err.code)); }
}

async function handleForgotPassword(){
  const e=document.getElementById('auth-email')?.value;
  if(!e){ showAuthError('Enter your email first.'); return; }
  try{ await sendPasswordResetEmail(auth,e); showAuthSuccess('Password reset email sent!'); }
  catch(err){ showAuthError(friendlyError(err.code)); }
}

async function handleGoogleSign(){
  try{
    await signInWithPopup(auth, googleProvider);
    showToast('Signed in with Google!');
    navigate('home');
  } catch(err){ showAuthError(friendlyError(err.code)); }
}

let confirmationResult = null;
async function handleSendOTP(){
  const phone = document.getElementById('phone-number')?.value;
  if(!phone){ showAuthError('Enter a valid phone number.'); return; }
  try{
    if(!window.recaptchaVerifier){
      window.recaptchaVerifier = new RecaptchaVerifier(auth,'recaptcha-container',{size:'normal'});
    }
    confirmationResult = await signInWithPhoneNumber(auth, phone, window.recaptchaVerifier);
    document.getElementById('otp-input-section')?.classList.remove('hidden');
    showToast('OTP sent!');
  } catch(err){ showAuthError(friendlyError(err.code)); }
}

async function handleVerifyOTP(){
  const code = document.getElementById('otp-code')?.value;
  try{
    await confirmationResult.confirm(code);
    showToast('Phone verified & signed in!');
    navigate('home');
  } catch(err){ showAuthError('Invalid OTP. Please try again.'); }
}

function showAuthError(msg){ const el=document.getElementById('auth-error'); if(el){el.className='error-msg';el.textContent=msg;} }
function showAuthSuccess(msg){ const el=document.getElementById('auth-success'); if(el){el.className='success-msg';el.textContent=msg;} }
function clearAuthMessages(){ document.getElementById('auth-error')?.classList.add('hidden'); document.getElementById('auth-success')?.classList.add('hidden'); document.getElementById('auth-error') && (document.getElementById('auth-error').textContent=''); document.getElementById('auth-success') && (document.getElementById('auth-success').textContent=''); }
function friendlyError(code){
  const m={
    'auth/user-not-found':'No account found with that email.',
    'auth/wrong-password':'Incorrect password.',
    'auth/email-already-in-use':'An account with this email already exists.',
    'auth/weak-password':'Password must be at least 6 characters.',
    'auth/invalid-email':'Please enter a valid email address.',
    'auth/too-many-requests':'Too many attempts. Try again later.',
    'auth/network-request-failed':'Network error. Check your connection.',
    'auth/popup-closed-by-user':'Sign-in popup was closed.',
  };
  return m[code]||`Error: ${code}`;
}

// ── TESTS CRUD ──
async function loadTests(searchTerm=''){
  const grid = document.getElementById('tests-grid');
  if(!grid) return;
  try{
    const q = query(collection(db,'tests'), where('status','==','published'));
    const snap = await getDocs(q);
    let tests = snap.docs.map(d=>({id:d.id,...d.data()}));
    if(searchTerm) tests = tests.filter(t=>
      t.title?.toLowerCase().includes(searchTerm)||
      t.topic?.toLowerCase().includes(searchTerm)||
      t.testerName?.toLowerCase().includes(searchTerm)
    );
    if(tests.length===0){
      grid.innerHTML='<div style="text-align:center;color:var(--muted);padding:3rem;grid-column:1/-1">No tests found yet. Be the first to create one!</div>';
      return;
    }
    grid.innerHTML = tests.map(t=>buildTestCard(t)).join('');
    grid.querySelectorAll('.test-card').forEach(card=>{
      card.addEventListener('click',()=>startTest(card.dataset.id, tests.find(t=>t.id===card.dataset.id)));
    });
  } catch(e){
    grid.innerHTML='<div style="color:var(--red);padding:2rem">Error loading tests: '+e.message+'</div>';
  }
}

function buildTestCard(t){
  const typeClass = {free:'badge-free',locked:'badge-locked',password:'badge-password',paid:'badge-paid'}[t.type]||'badge-free';
  const diffClass = {easy:'diff-easy',medium:'diff-medium',hard:'diff-hard'}[t.difficulty]||'diff-medium';
  return `
  <div class="test-card" data-id="${t.id}">
    <div class="test-thumb">
      ${t.thumbnail ? `<img src="${t.thumbnail}" alt="${t.title}" onerror="this.style.display='none'"/>` : '📄'}
      <span class="test-type-badge ${typeClass}">${t.type||'free'}</span>
    </div>
    <div class="test-body">
      <div class="test-title">${t.title}</div>
      <div class="test-meta">
        <span>📚 ${t.topic}</span>
        <span>❓ ${t.questions?.length||0} Qs</span>
        <span>⏱ ${t.duration||30} min</span>
      </div>
      ${t.reason ? `<div style="font-size:0.78rem;color:var(--muted);margin-bottom:0.5rem">Purpose: ${t.reason}</div>` : ''}
      <div class="test-footer">
        <span class="diff-badge ${diffClass}">${t.difficulty||'medium'}</span>
        <span style="font-size:0.75rem;color:var(--muted)">by ${t.testerName||'Tester'}</span>
      </div>
    </div>
  </div>`;
}

async function startTest(id, testData){
  if(!currentUser){ navigate('auth'); return; }
  const t = testData || await getTestById(id);
  if(!t){ showToast('Test not found','error'); return; }
  if(t.type==='password'){
    showModal(`
      <div class="modal-title">🔒 Password Protected</div>
      <div style="color:var(--muted);margin-bottom:1rem">Enter the password to access this test</div>
      <input class="form-input" id="modal-password" type="password" placeholder="Enter test password"/>
      <div class="modal-footer">
        <button class="btn btn-outline btn-sm" onclick="document.querySelector('.modal-overlay').remove()">Cancel</button>
        <button class="btn btn-primary btn-sm" id="modal-confirm-pw">Start Test</button>
      </div>
    `, ov=>{
      ov.querySelector('#modal-confirm-pw').addEventListener('click',()=>{
        const pw = ov.querySelector('#modal-password').value;
        if(pw===t.password){ ov.remove(); examAnswers={}; navigate('exam',t); }
        else showToast('Wrong password','error');
      });
    });
    return;
  }
  examAnswers = {};
  navigate('exam', t);
}

async function getTestById(id){
  try{ const d = await getDoc(doc(db,'tests',id)); return d.exists()?{id:d.id,...d.data()}:null; }
  catch(e){ return null; }
}

async function loadTestByIdAndStart(idOrLink){
  const id = idOrLink.split('/').pop();
  const t = await getTestById(id);
  if(t) startTest(id,t);
  else showToast('Test not found','error');
}

async function handleSearch(){ loadTests(document.getElementById('search-q')?.value?.toLowerCase()||''); }

// ── TESTER DASHBOARD ──
async function loadTesterDash(){ loadTesterTab('my-tests'); }

async function loadTesterTab(tab){
  const el = document.getElementById('tester-tab-content');
  if(!el||!currentUser) return;
  if(tab==='my-tests'){
    el.innerHTML='<div class="loader"><div class="spinner"></div></div>';
    const q = query(collection(db,'tests'), where('testerId','==',currentUser.uid));
    const snap = await getDocs(q);
    const tests = snap.docs.map(d=>({id:d.id,...d.data()}));
    if(!tests.length){ el.innerHTML='<div style="text-align:center;color:var(--muted);padding:3rem;border:1px dashed var(--border);border-radius:12px">No tests yet. Create your first!</div>'; return; }
    el.innerHTML=`<div class="grid-2">${tests.map(t=>`
      <div class="create-card" style="margin-bottom:0">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:1rem">
          <div>
            <div style="font-weight:600;margin-bottom:0.25rem">${t.title}</div>
            <div style="font-size:0.8rem;color:var(--muted)">${t.topic} · ${t.questions?.length||0} questions · ${t.status}</div>
          </div>
          <div style="display:flex;gap:0.5rem;flex-shrink:0">
            <button class="btn btn-outline btn-sm" onclick="navigator.clipboard.writeText(window.location.origin+'?test=${t.id}');window.showToast2('Link copied!')">🔗</button>
            <button class="btn btn-sm" style="background:var(--accent-glow);border:1px solid var(--accent);color:var(--accent2)" onclick="window.goReview('${t.id}')">Review</button>
            <button class="btn btn-danger btn-sm" onclick="window.deleteTest('${t.id}')">✕</button>
          </div>
        </div>
      </div>
    `).join('')}</div>`;
  } else if(tab==='submissions'){
    el.innerHTML='<div class="loader"><div class="spinner"></div></div>';
    const myTests = await getDocs(query(collection(db,'tests'),where('testerId','==',currentUser.uid)));
    const testIds = myTests.docs.map(d=>d.id);
    if(!testIds.length){ el.innerHTML='<div style="color:var(--muted);text-align:center;padding:2rem">No submissions yet</div>'; return; }
    let allSubs = [];
    for(const tid of testIds.slice(0,10)){
      const subs = await getDocs(collection(db,'tests',tid,'submissions'));
      subs.docs.forEach(d=>allSubs.push({id:d.id,...d.data(),testId:tid}));
    }
    if(!allSubs.length){ el.innerHTML='<div style="color:var(--muted);text-align:center;padding:2rem">No submissions yet</div>'; return; }
    el.innerHTML = allSubs.map(s=>buildReviewItem(s)).join('');
    attachReviewActions();
  } else if(tab==='certificates'){
    el.innerHTML='<div style="color:var(--muted);text-align:center;padding:2rem">Certificates issued to passing students will appear here.</div>';
  }
}

window.showToast2 = (m)=>showToast(m);
window.goReview = (id)=>{ currentTest={id}; navigate('review'); };
window.deleteTest = async (id)=>{
  if(!confirm('Delete this test? This cannot be undone.')) return;
  await deleteDoc(doc(db,'tests',id));

// ── QUESTION BUILDER ──
function addQuestion(){
  const type = document.getElementById('add-q-type')?.value || 'MCQ';
  const q = {type, text:'', marks: type==='MCQ'?1:5, options:type==='MCQ'?['','','','']:undefined, correctAnswer:null};
  questions.push(q);
  refreshQuestionsList();
}

function refreshQuestionsList(){
  const el = document.getElementById('questions-list');
  if(!el) return;
  el.innerHTML = questions.length===0
    ? '<div style="text-align:center;color:var(--muted);padding:2rem;border:1px dashed var(--border);border-radius:12px">No questions yet.</div>'
    : questions.map((q,i)=>buildQuestionItem(q,i)).join('');
  attachQuestionEvents();
}

function attachQuestionEvents(){
  document.querySelectorAll('[data-field="text"]').forEach(ta=>{
    ta.addEventListener('input',e=>{ const i=+e.target.dataset.qi; if(questions[i]) questions[i].text=e.target.value; });
  });
  document.querySelectorAll('[data-field="marks"]').forEach(inp=>{
    inp.addEventListener('input',e=>{ const i=+e.target.dataset.qi; if(questions[i]) questions[i].marks=+e.target.value||1; });
  });
  document.querySelectorAll('[data-field="option"]').forEach(inp=>{
    inp.addEventListener('input',e=>{
      const i=+e.target.dataset.qi; const oi=+e.target.dataset.oi;
      if(questions[i]&&questions[i].options) questions[i].options[oi]=e.target.value;
    });
  });
  document.querySelectorAll('.option-radio').forEach(r=>{
    r.addEventListener('change',e=>{ const i=+e.target.dataset.qi; if(questions[i]) questions[i].correctAnswer=+e.target.value; });
  });
  document.querySelectorAll('.q-remove').forEach(btn=>{
    btn.addEventListener('click',e=>{ questions.splice(+e.target.dataset.qi,1); refreshQuestionsList(); });
  });
  document.querySelectorAll('.add-option-btn').forEach(btn=>{
    btn.addEventListener('click',e=>{ const i=+e.target.dataset.qi; if(questions[i]?.options) { questions[i].options.push(''); refreshQuestionsList(); }});
  });
}

async function aiGenerateQuestions(){
  const topic = document.getElementById('test-topic')?.value;
  if(!topic){ showToast('Enter a topic first','error'); return; }
  const btn = document.getElementById('btn-ai-gen-q');
  btn.textContent='🤖 Generating…'; btn.disabled=true;
  const type = document.getElementById('add-q-type')?.value||'MCQ';
  const diff = document.getElementById('test-difficulty')?.value||'medium';
  const newQs = await generateQuestions(topic, type, 5, diff);
  questions = [...questions, ...newQs];
  refreshQuestionsList();
  btn.textContent='🤖 AI Generate'; btn.disabled=false;
  showToast(`Added ${newQs.length} AI questions!`);
}

  if(!file) return;
  showToast('Uploading image…');
  const url = await uploadImage(file);
  if(url){ testThumbnailUrl=url; updateThumbPreview(); showToast('Image uploaded!'); }
  else showToast('Upload failed','error');
}

function updateThumbPreview(){
  const el = document.getElementById('thumb-preview');
  if(!el) return;
  el.innerHTML = testThumbnailUrl ? `<img src="${testThumbnailUrl}" style="width:100%;max-height:120px;object-fit:cover;border-radius:8px;border:1px solid var(--border)" onerror="this.style.display='none'"/>` : '';
}

// ── SAVE TEST ──
async function saveTest(status='draft'){
  if(!currentUser){ showToast('Sign in first','error'); return; }
  const title = document.getElementById('test-title')?.value?.trim();
  const topic = document.getElementById('test-topic')?.value?.trim();
  if(!title||!topic){ showToast('Title and topic are required','error'); return; }
  if(status==='published' && questions.length===0){ showToast('Add at least one question','error'); return; }

  const testData = {
    title, topic,
    reason: document.getElementById('test-reason')?.value||'',
    description: document.getElementById('test-desc')?.value||'',
    thumbnail: testThumbnailUrl || document.getElementById('test-thumb-url')?.value||'',
    type: document.getElementById('test-type')?.value||'free',
    difficulty: document.getElementById('test-difficulty')?.value||'medium',
    duration: +document.getElementById('test-duration')?.value||30,
    passmark: +document.getElementById('test-passmark')?.value||60,
    password: document.getElementById('test-password')?.value||'',
    price: +document.getElementById('test-price')?.value||0,
    certificate: document.getElementById('tog-cert')?.classList.contains('on'),
    antiCheat: document.getElementById('tog-anticheat')?.classList.contains('on'),
    aiGrading: document.getElementById('tog-aigrade')?.classList.contains('on'),
    aiRequirements: document.getElementById('ai-requirements')?.value||'',
    aiGradingMode: document.getElementById('ai-grading-mode')?.value||'manual',
    questions: questions,
    testerId: currentUser.uid,
    testerName: currentUser.displayName||currentUser.email?.split('@')[0]||'Tester',
    status,
    createdAt: serverTimestamp(),
  };

  try{
    const ref = await addDoc(collection(db,'tests'), testData);
    showToast(status==='published'?'Test published! 🚀':'Draft saved!');
    questions=[];
    navigate('tester');
  } catch(e){ showToast('Error saving: '+e.message,'error'); }
}

// ── EXAM TIMER ──
function startExamTimer(){
  if(timerInterval) clearInterval(timerInterval);
  const dur = (currentTest?.duration||30)*60;
  examStartTime = Date.now();
  timerInterval = setInterval(()=>{
    const elapsed = Math.floor((Date.now()-examStartTime)/1000);
    const left = dur-elapsed;
    if(left<=0){ clearInterval(timerInterval); submitExam(); return; }
    const m=Math.floor(left/60); const s=left%60;
    const el=document.getElementById('exam-timer');
    if(el){ el.textContent=`${m}:${s.toString().padStart(2,'0')}`; if(left<300) el.classList.add('warning'); }
  },1000);
}

// ── SUBMIT EXAM ──
async function submitExam(){
  if(timerInterval) clearInterval(timerInterval);
  const qs = currentTest?.questions||[];
  const antiCheat = currentTest?.antiCheat;
  let flaggedAnswers = [];
  let totalScore = 0;
  let maxScore = qs.reduce((s,q)=>s+(+q.marks||1),0);
  let breakdown = [];

  // Score MCQ
  for(let i=0;i<qs.length;i++){
    const q=qs[i]; const ans=examAnswers[i];
    if(q.type==='MCQ'){
      const correct = ans==q.correctAnswer;
      breakdown.push({qIndex:i,awarded:correct?+q.marks:0,feedback:correct?'Correct':'Incorrect'});
      if(correct) totalScore+=+q.marks;
    }
  }

  // AI detect + score open answers
  const openQs = qs.filter((q,i)=>q.type!=='MCQ');
  if(openQs.length){
    if(antiCheat){
      for(let i=0;i<qs.length;i++){
        if(qs[i].type!=='MCQ' && examAnswers[i]){
          const det = await detectAiText(examAnswers[i]);
          if(det.flagged){ flaggedAnswers.push(i); }
        }
      }
    }
    if(currentTest.aiGrading){
      const aiResult = await aiScoreAnswers(qs, examAnswers, currentTest.aiRequirements);
      if(aiResult.breakdown){
        aiResult.breakdown.forEach(b=>{
          if(qs[b.qIndex]?.type!=='MCQ'){
            let awarded = b.awarded||0;
            if(flaggedAnswers.includes(b.qIndex)) awarded = Math.floor(awarded*0.75);
            totalScore+=awarded;
            breakdown.push({...b,awarded});
          }
        });
      }
    } else {
      // Manual grading pending
      openQs.forEach((q,_)=>{ breakdown.push({qIndex:qs.indexOf(q),awarded:0,feedback:'Pending manual review'}); });
    }
  }

  // Deduct flagged marks
  const passmark = currentTest?.passmark||60;
  const pct = maxScore>0 ? Math.round(totalScore/maxScore*100) : 0;
  const passed = pct >= passmark;

  window._lastResult = {
    totalScore, maxScore, pct,
    recommendation: passed?'pass':'fail',
    summary: `You scored ${pct}% (${totalScore}/${maxScore}). Pass mark: ${passmark}%.`,
    flaggedAnswers,
    aiRecommendation: currentTest.aiGrading ? `AI assessed your performance as "${passed?'Pass':'Fail'}" based on tester requirements.` : null,
  };

  // Save submission
  if(currentUser && currentTest?.id){
    try{
      await addDoc(collection(db,'tests',currentTest.id,'submissions'),{
        userId: currentUser.uid,
        userName: currentUser.displayName||currentUser.email||'User',
        totalScore, maxScore, pct, passed,
        answers: examAnswers,
        flaggedAnswers,
        status: currentTest.aiGradingMode==='ai-auto' ? (passed?'passed':'failed') : 'pending',
        submittedAt: serverTimestamp(),
      });
    } catch(e){}
  }
  navigate('result');
}

// ── REVIEWS ──
async function loadReviews(){
  const el = document.getElementById('review-list');
  if(!el||!currentTest?.id) return;
  try{
    const snap = await getDocs(collection(db,'tests',currentTest.id,'submissions'));
    const subs = snap.docs.map(d=>({id:d.id,...d.data()}));
    if(!subs.length){ el.innerHTML='<div style="color:var(--muted);text-align:center;padding:2rem">No submissions yet</div>'; return; }
    el.innerHTML = subs.map(s=>buildReviewItem(s,currentTest.id)).join('');
    attachReviewActions();
  } catch(e){ el.innerHTML='<div style="color:var(--red)">Error: '+e.message+'</div>'; }
}

function buildReviewItem(s, testId){
  return `
  <div class="review-item" data-sid="${s.id}" data-tid="${testId||s.testId}">
    <div class="review-header">
      <div class="review-user">
        <div class="avatar">${(s.userName||'U')[0].toUpperCase()}</div>
        <div>
          <div style="font-weight:500">${s.userName||'User'}</div>
          <div style="font-size:0.75rem;color:var(--muted)">${s.submittedAt?.toDate?.().toLocaleDateString()||'Recently'}</div>
        </div>
      </div>
      <div class="review-score">${s.totalScore||0}/${s.maxScore||100}</div>
    </div>
    ${s.flaggedAnswers?.length ? `<div class="flag-badge" style="margin-bottom:0.75rem">⚠️ ${s.flaggedAnswers.length} AI-flagged answer(s) — marks deducted</div>` : ''}
    <div style="font-size:0.8rem;color:var(--muted);margin-bottom:0.75rem">Status: <strong style="color:${s.status==='passed'?'var(--green)':s.status==='failed'?'var(--red)':'var(--gold)'}">${s.status||'pending'}</strong></div>
    <div class="review-actions">
      <button class="btn btn-success btn-sm" data-action="pass" data-sid="${s.id}" data-tid="${testId||s.testId}">✅ Pass</button>
      <button class="btn btn-danger btn-sm" data-action="fail" data-sid="${s.id}" data-tid="${testId||s.testId}">❌ Fail</button>
    </div>
  </div>`;
}

function attachReviewActions(){
  document.querySelectorAll('[data-action="pass"],[data-action="fail"]').forEach(btn=>{
    btn.addEventListener('click', async e=>{
      const action = e.target.dataset.action;
      const sid = e.target.dataset.sid;
      const tid = e.target.dataset.tid;
      if(!tid||!sid) return;
      await updateDoc(doc(db,'tests',tid,'submissions',sid),{status:action==='pass'?'passed':'failed'});
      showToast(`Submission marked as ${action==='pass'?'Passed':'Failed'}`);
      loadReviews();
    });
  });
}
